                  type: string
                  description: 'Must not be greater than 150 characters.'
                  example: vmqeopfuudtdsufvyvddq
                phone:
                  type: string
                  description: 'Must not be greater than 20 characters.'
                  example: amniihfqcoynlazgh
                  nullable: true
                email:
                  type: string
                  description: 'Must be a valid email address. Must not be greater than 150 characters.'
                  example: roob.mona@example.org
                  nullable: true
                type:
                  type: string
                  description: ''
                  example: business
                  enum:
                    - individual
                    - business
                  nullable: true
                national_id:
                  type: string
                  description: 'Must not be greater than 14 characters.'
                  example: xbajwbpilpmu
                  nullable: true
                tax_number:
                  type: string
                  description: 'Must not be greater than 20 characters.'
                  example: finllwloauydlsmsj
                  nullable: true
                commercial_register:
                  type: string
                  description: 'Must not be greater than 30 characters.'
                  example: uryvojcybzvrbyickznky
                  nullable: true
                governate:
                  type: string
                  description: 'Must not be greater than 50 characters.'
                  example: gloigmkwxphlvazjrcnfb
                  nullable: true
                city:
                  type: string
                  description: 'Must not be greater than 100 characters.'
                  example: aqywuxhgjjmzuxjubqouz
                  nullable: true
                address:
                  type: string
                  description: 'Must not be greater than 500 characters.'
                  example: swiwxtrkimfcatbxspzmr
                  nullable: true
                credit_limit:
                  type: number
                  description: 'Must be at least 0. Must not be greater than 9999999.'
                  example: 1
                  nullable: true
                notes:
                  type: string
                  description: 'Must not be greater than 500 characters.'
                  example: zsroyjpxmqesedyghenqc
                  nullable: true
                customer_group_id:
                  type: integer
                  description: 'Must match an existing stored value.'
                  example: 17
                  nullable: true
                price_level:
                  type: string
                  description: ''
                  example: retail
                  enum:
                    - retail
                    - wholesale
                    - vip
                  nullable: true
                is_active:
                  type: boolean
                  description: ''
                  example: true
              required:
