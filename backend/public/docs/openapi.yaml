  /api/customers/quick:
    post:
      summary: 'Quick-create a customer from the POS (name + phone only).'
      operationId: quickCreateACustomerFromThePOSname+PhoneOnly
      description: 'Accessible to view_pos users without full CRM permissions.'
      parameters: []
      responses: {  }
      tags:
        - Customers
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'Must not be greater than 150 characters.'
                  example: vmqeopfuudtdsufvyvddq
                phone:
                  type: string
                  description: 'Must not be greater than 20 characters.'
                  example: amniihfqcoynlazgh
                  nullable: true
              required:
