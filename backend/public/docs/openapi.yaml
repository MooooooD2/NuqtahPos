      responses: {  }
      tags:
        - Endpoints
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                invoices:
                  type: array
                  description: 'Must have at least 1 items. Must not have more than 20 items.'
                  example:
                    - []
                  items:
                    type: object
                    properties:
                      offline_uuid:
                        type: string
                        description: 'Must be a valid UUID.'
                        example: 66529e01-d113-3473-8d6f-9e11e09332ea
                      items:
                        type: array
                        description: 'Must have at least 1 items. Must not have more than 100 items.'
                        example:
                          - []
                        items:
                          type: object
                          properties:
                            product_id:
                              type: integer
                              description: 'Must match an existing stored value.'
                              example: 17
                            quantity:
                              type: integer
                              description: 'Must be at least 1. Must not be greater than 9999.'
                              example: 13
                            price:
                              type: number
                              description: 'Must be at least 0. Must not be greater than 9999999.'
                              example: 16
                              nullable: true
                          required:
                            - product_id
                            - quantity
                      payment_method:
                        type: string
                        description: ''
                        example: card
                        enum:
                          - cash
                          - card
                          - transfer
                          - wallet
                          - credit
                        nullable: true
                      discount:
                        type: number
                        description: 'Must be at least 0. Must not be greater than 9999999.'
                        example: 5
                        nullable: true
                      cash_received:
                        type: number
                        description: 'Must be at least 0.'
                        example: 50
                        nullable: true
                      customer_id:
                        type: string
                        description: 'Must match an existing stored value.'
                        example: null
                        nullable: true
                      notes:
                        type: string
                        description: 'Must not be greater than 500 characters.'
                        example: pfuudtdsufvyvddqamnii
                        nullable: true
                    required:
                      - offline_uuid
                      - items
              required:
                - invoices
      security: []
