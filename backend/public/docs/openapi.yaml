components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: 'You can retrieve your token by visiting your dashboard and clicking <b>Generate API token</b>.'
security:
  -
    default: []
paths:
  /api/login:
    post:
      summary: 'Log in'
      operationId: logIn
      description: 'Authenticate with tenant code, username and password; returns a Sanctum bearer token.'
      parameters: []
      responses: {  }
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tenant_code:
                  type: string
                  description: 'Must not be greater than 50 characters.'
                  example: vmqeopfuudtdsufvyvddq
                username:
                  type: string
                  description: 'Must not be greater than 100 characters.'
                  example: amniihfqcoynlazghdtqt
                password:
                  type: string
                  description: 'Must not be greater than 200 characters.'
                  example: "t(!Cs'YAKYLk4>S"
              required:
                - tenant_code
                - username
                - password
      security: []
  /api/logout:
    post:
      summary: ''
      operationId: postApiLogout
      description: ''
      parameters: []
      responses: {  }
      tags:
        - Authentication
      security: []
  /api/customers/search:
    get:
      summary: ''
      operationId: getApiCustomersSearch
      description: ''
      parameters: []
