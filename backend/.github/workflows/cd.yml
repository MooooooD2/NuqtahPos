name: CD — Deploy POS Laravel

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'production'
        type: choice
        options: [production, staging]

jobs:
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'production' }}
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'production' }}

    concurrency:
      group: deploy-${{ github.event.inputs.environment || 'production' }}
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, json, bcmath, pdo
          coverage: none

      - name: Install PHP dependencies (production)
        run: composer install --prefer-dist --no-interaction --no-dev --optimize-autoloader

      # ── Check whether deploy secrets are configured ──────────────────────
      - name: Check deploy configuration
        id: config
        run: |
          if [ -n "$HOST" ]; then
            echo "configured=true"  >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "⚠️  DEPLOY_HOST secret is not set — skipping SSH deploy."
            echo "   Add DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY, DEPLOY_PATH"
            echo "   to your repository secrets to enable automatic deployment."
          fi
        env:
          HOST: ${{ secrets.DEPLOY_HOST }}

      # ── SSH deploy (skipped when secrets are absent) ──────────────────────
      - name: Deploy via SSH (zero-downtime)
        if: steps.config.outputs.configured == 'true'
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}

            # Pull latest code
            git pull origin main

            # Install production dependencies
            composer install --prefer-dist --no-interaction --no-dev --optimize-autoloader

            # Run migrations
            php artisan migrate --force

            # Clear & rebuild all caches
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            php artisan event:cache

            # Reload queue workers gracefully
            php artisan queue:restart

            echo "✅ Deploy complete at $(date)"

      # ── Sentry release (skipped when secrets are absent) ─────────────────
      - name: Notify Sentry of deployment
        if: steps.config.outputs.configured == 'true' && success()
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        run: |
          [ -z "$SENTRY_AUTH_TOKEN" ] && exit 0   # skip if Sentry not configured

          curl -sS https://sentry.io/api/0/organizations/${SENTRY_ORG}/releases/ \
            -H "Authorization: Bearer ${SENTRY_AUTH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"version\": \"${GITHUB_SHA}\", \"projects\": [\"${SENTRY_PROJECT}\"]}" || true

          curl -sS https://sentry.io/api/0/organizations/${SENTRY_ORG}/releases/${GITHUB_SHA}/deploys/ \
            -H "Authorization: Bearer ${SENTRY_AUTH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"environment\": \"${{ github.event.inputs.environment || 'production' }}\"}" || true

      # ── Slack notification ────────────────────────────────────────────────
      - name: Send deploy notification
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: |
            *POS Deploy* — ${{ job.status == 'success' && '✅' || '❌' }}
            Environment: `${{ github.event.inputs.environment || 'production' }}`
            Branch: `${{ github.ref_name }}`
            Commit: `${{ github.sha }}`
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
